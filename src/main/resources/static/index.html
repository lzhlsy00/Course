<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校选课管理系统</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        main {
            max-width: 1080px;
            margin: 32px auto;
            padding: 0 20px;
        }

        h1 {
            margin-bottom: 8px;
            color: #12355b;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            padding: 20px;
            margin-top: 18px;
            box-shadow: 0 4px 14px rgba(18, 53, 91, 0.08);
        }

        textarea {
            width: 100%;
            min-height: 140px;
            box-sizing: border-box;
            border: 1px solid #bcccdc;
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
        }

        input {
            min-width: 260px;
            border: 1px solid #bcccdc;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
        }

        button {
            margin-top: 10px;
            margin-right: 8px;
            border: none;
            border-radius: 6px;
            background: #0f6cbf;
            color: #ffffff;
            padding: 10px 18px;
            cursor: pointer;
        }

        button:hover {
            background: #0a5596;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #ffffff;
        }

        th, td {
            border: 1px solid #d9e2ec;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #e7f0fa;
        }

        .message {
            margin-top: 12px;
            color: #b42318;
        }

        .type-title {
            margin-top: 20px;
            color: #12355b;
        }

        .file-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
        }

        .drop-zone {
            margin-top: 14px;
            border: 2px dashed #9fb3c8;
            border-radius: 8px;
            background: #f8fbff;
            padding: 24px;
            text-align: center;
            color: #52606d;
        }

        .drop-zone.drag-over {
            border-color: #0f6cbf;
            background: #e7f0fa;
            color: #12355b;
        }
    </style>
</head>
<body>
<main>
    <h1>高校选课管理系统</h1>
    <p>支持 CSV 批量导入、去重、排序、分类展示和关键词检索。</p>

    <section class="panel">
        <h2>数据批量导入</h2>
        <p>每行一条数据，格式：学生ID,课程ID,课程名称,课程类型</p>
        <textarea id="csvInput">S000001,C000001,Java程序设计,专业课
S000002,C000003,计算机网络,公共课
S000003,C000002,大学英语,公共课</textarea>
        <br>
        <button onclick="importCsv()">导入文本框数据</button>
        <div class="file-row">
            <input id="fileInput" type="file" accept=".csv,text/csv" hidden onchange="importSelectedFile()">
            <button onclick="document.getElementById('fileInput').click()">选择 CSV 文件导入</button>
        </div>
        <div id="dropZone" class="drop-zone">
            将 CSV 文件拖拽到这里导入
        </div>
    </section>

    <section class="panel">
        <h2>选课检索</h2>
        <input id="keywordInput" placeholder="输入学生ID、课程ID、课程名称或课程类型">
        <button onclick="searchRecords()">检索</button>
        <button onclick="loadSamples()">显示样例数据</button>
        <div id="message" class="message"></div>
    </section>

    <section class="panel">
        <h2>数据展示</h2>
        <div id="recordContainer"></div>
    </section>
</main>

<script>
    const courseTypes = ["公共课", "专业课", "选修课"];

    async function loadSamples() {
        const response = await fetch("/api/enrollments/samples");
        const data = await response.json();
        showMessage("");
        renderRecords(data);
    }

    async function importCsv() {
        const csvText = document.getElementById("csvInput").value;
        const response = await fetch("/api/enrollments/import", {
            method: "POST",
            headers: {"Content-Type": "text/plain;charset=UTF-8"},
            body: csvText
        });
        const data = await response.json();
        showMessage("");
        renderRecords(data);
    }

    async function importSelectedFile() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        if (!file) {
            return;
        }
        await uploadCsvFile(file);
        fileInput.value = "";
    }

    async function uploadCsvFile(file) {
        if (!file.name.toLowerCase().endsWith(".csv")) {
            alert("导入失败：请选择 CSV 文件");
            return;
        }

        const confirmed = confirm(`确认导入 CSV 文件：${file.name}？`);
        if (!confirmed) {
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch("/api/enrollments/import-file", {
                method: "POST",
                body: formData
            });
            if (!response.ok) {
                const reason = await response.text();
                throw new Error(reason || "服务器处理失败");
            }
            const data = await response.json();
            renderRecords(data);
            alert("CSV 文件导入成功");
        } catch (error) {
            alert(`CSV 文件导入失败：${error.message}`);
        }
    }

    async function searchRecords() {
        const keyword = encodeURIComponent(document.getElementById("keywordInput").value);
        const response = await fetch(`/api/enrollments/search?keyword=${keyword}`);
        const result = await response.json();
        showMessage(result.message || "");
        renderRecords(result.data);
    }

    function renderRecords(groupedRecords) {
        const container = document.getElementById("recordContainer");
        container.innerHTML = "";

        courseTypes.forEach(type => {
            const records = groupedRecords[type] || [];
            if (records.length === 0) {
                return;
            }

            const title = document.createElement("h3");
            title.className = "type-title";
            title.textContent = type;
            container.appendChild(title);
            container.appendChild(createTable(records));
        });
    }

    function createTable(records) {
        const table = document.createElement("table");
        table.innerHTML = `
            <thead>
            <tr>
                <th>学生ID</th>
                <th>课程ID</th>
                <th>课程名称</th>
                <th>课程类型</th>
            </tr>
            </thead>
            <tbody></tbody>
        `;

        const tbody = table.querySelector("tbody");
        records.forEach(record => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${escapeHtml(record.studentId)}</td>
                <td>${escapeHtml(record.courseId)}</td>
                <td>${escapeHtml(record.courseName)}</td>
                <td>${escapeHtml(record.courseType)}</td>
            `;
            tbody.appendChild(tr);
        });
        return table;
    }

    function showMessage(message) {
        document.getElementById("message").textContent = message;
    }

    function initDropZone() {
        const dropZone = document.getElementById("dropZone");

        dropZone.addEventListener("dragover", event => {
            event.preventDefault();
            dropZone.classList.add("drag-over");
        });

        dropZone.addEventListener("dragleave", () => {
            dropZone.classList.remove("drag-over");
        });

        dropZone.addEventListener("drop", async event => {
            event.preventDefault();
            dropZone.classList.remove("drag-over");
            const file = event.dataTransfer.files[0];
            if (!file) {
                return;
            }
            await uploadCsvFile(file);
        });
    }

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    initDropZone();
    loadSamples();
</script>
</body>
</html>
